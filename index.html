<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Act Now if Your Child Was Harassed</title>
  <link rel="icon" type="image/png" href="Roblox favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <a href="https://www.roblox.com/login" class="login-btn">Log In</a>
  </header>

  <main class="main-container">
    <!-- Info panel omitted for brevity -->

    <section class="card glass form-section">
      <h1 class="title">Act Now if Your Child Was Harassed</h1>
      <form id="registrationForm" method="POST" action="/submit" novalidate>
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" required />
        </div>

        <div class="form-group">
          <label for="lastName">Last Name *</label>
          <input type="text" id="lastName" name="lastName" required />
        </div>

        <div class="form-group">
          <label for="username">Username (Optional)</label>
          <input type="text" id="username" name="username" />
        </div>

        <div class="form-group">
          <label for="gender">Gender *</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="contactNumber">Contact Number *</label>
          <input type="number" id="contactNumber" name="contactNumber" required />
        </div>

        <div class="form-row checkbox-row">
          <label class="checkbox">
            <input type="checkbox" id="consent" name="consent" required />
            <span>I confirm that I may be contacted *</span>
          </label>
        </div>

        <div class="form-row checkbox-row">
          <label class="checkbox">
            <input type="checkbox" id="termsAgree" name="termsAgree" required />
            <span>I agree to the <a href="terms.html" target="_blank">Terms and Conditions</a> *</span>
          </label>
        </div>

        <button type="submit" class="btn primary">Submit</button>
        <p class="submit-status" id="submitStatus" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <!-- Footer content omitted for brevity -->
    </div>
  </footer>

  <script>
    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      // Convert checkboxes to boolean
      data.consent = formData.get('consent') === 'on';
      data.termsAgree = formData.get('termsAgree') === 'on';

      try {
        const response = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const result = await response.json();
        document.getElementById('submitStatus').textContent = result.message;
        if(result.success) form.reset();
      } catch (err) {
        document.getElementById('submitStatus').textContent = 'Submission failed. Please try again.';
        console.error(err);
      }
    });
  </script>
</body>
</html>
